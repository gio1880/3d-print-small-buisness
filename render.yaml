services:
  - type: web
    name: 3d-print-small-business-store
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SITE_URL
        sync: false
      - key: STANDARD_SHIPPING_CENTS
        value: 500
